<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeBlocks</title>
    <style>
        /* 기본 스타일 리셋 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: #37352f;
            background-color: #ffffff;
            line-height: 1.5;
            width: 100%;
        }

        /* 헤더 영역 */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; border-bottom: 1px solid #e9e9e7;
            background: #ffffff; position: sticky; top: 0; z-index: 50;
        }
        .header-title { display: flex; align-items: center; gap: 10px; }
        .header-title h1 { font-size: 22px; font-weight: 700; color: #37352f; letter-spacing: -0.5px; }
        .cute-block {
            width: 18px; height: 18px; background: #ffb3ba; border-radius: 4px;
            box-shadow: 2px 2px 0px #ffdfba, 4px 4px 0px #ffffba;
            transform: rotate(-10deg); transition: background 0.3s;
        }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .header-legend { display: flex; gap: 12px; font-size: 17px; font-weight: 700; color: #333; }
        
        .theme-selector { 
            display: flex; align-items: center; gap: 6px; 
            border-right: 1px solid #e9e9e7; padding-right: 20px; margin-right: 20px; 
        }
        .theme-selector span { font-size: 13px; font-weight: 600; color: #777; }
        .theme-btn {
            width: 22px; height: 22px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1);
            cursor: pointer; transition: transform 0.2s;
        }
        .theme-btn.active { transform: scale(1.15); box-shadow: 0 0 0 2px #fff, 0 0 0 4px #007bff; }

        .nav-controls { display: flex; align-items: center; gap: 16px; }
        .nav-controls button { background: none; border: none; cursor: pointer; font-size: 20px; padding: 4px 12px; border-radius: 6px; }
        .nav-controls h2 { font-size: 18px; font-weight: 600; min-width: 140px; text-align: center; }
        .view-controls select { padding: 8px 16px; font-size: 14px; border-radius: 6px; border: 1px solid #e9e9e7; background: #f7f7f5; cursor: pointer; font-weight: 500; }

        /* 레이아웃 */
        .app-container { display: flex; padding: 20px 40px; gap: 24px; align-items: flex-start; }
        main { flex: 1; min-width: 0; }
        
        /* 캘린더 공통 */
        .weekly-view, .monthly-view { border: 1px solid #e9e9e7; border-radius: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .weekly-header, .weekly-body { display: grid; grid-template-columns: 50px repeat(7, 1fr); width: 100%; min-width: fit-content; }

        /* 주간 뷰 그리드 */
        .weekly-header { background: #f7f7f5; border-bottom: 1px solid #e9e9e7; }
        .weekly-header > div { text-align: center; padding: 12px 0; font-size: 14px; font-weight: 600; border-left: 1px solid #e9e9e7; }
        .weekly-body { height: 750px; position: relative; }
        .time-col { display: flex; flex-direction: column; background: #ffffff; }
        .time-slot {
            height: 50px; text-align: right; padding-right: 8px; 
            border-top: 1px solid #eee; display: flex; align-items: flex-start; justify-content: flex-end;
            box-sizing: border-box;
        }
        .time-slot span { font-size: 11px; color: #999; line-height: 1; margin-top: -6px; }
        .day-col {
            border-left: 1px solid #e9e9e7; position: relative; height: 100%;
            background-image: repeating-linear-gradient(to bottom, #eee, #eee 1px, transparent 1px, transparent 50px);
            background-repeat: repeat-y; transition: background-color 0.2s;
            box-sizing: border-box;
        }
        .day-col.today { background-color: #efefef !important; border-left: 2px solid #ccc; border-right: 2px solid #ccc; }
        .day-col.drag-over { background-color: rgba(0, 123, 255, 0.05); }

        /* 일정 블록 */
        .event-block {
            position: absolute; left: 2px; right: 2px; border-radius: 8px; padding: 4px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(255,255,255,0.3); transition: transform 0.2s;
            cursor: pointer; overflow: hidden; display: flex; flex-direction: column;
        }
        .event-block.locked { border: 3px solid #333; }
        .event-block.completed { filter: grayscale(0.8) brightness(0.9); opacity: 0.8; }
        .event-title {
            font-size: 11px; font-weight: 700; line-height: 1.2;
            white-space: normal; word-break: break-all;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            pointer-events: none;
        }
        .resize-handle { position: absolute; bottom: 0; left: 0; right: 0; height: 10px; cursor: ns-resize; z-index: 10; }
        
        .lock-btn, .check-btn {
            position: absolute; background: none; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; opacity: 0.4; transition: opacity 0.2s;
        }
        .lock-btn { top: 4px; right: 4px; }
        .check-btn { bottom: 8px; left: 50%; transform: translateX(-50%); }
        .lock-btn.active, .check-btn.active { opacity: 1; }
        
        /* 모드별 버튼 제어 */
        .event-block.edit-active .lock-btn, .event-block.edit-active .check-btn { display: none !important; }
        .event-block.lock-mode-active .check-btn { display: none !important; }
        .event-block.lock-mode-active .lock-btn { opacity: 1; transform: scale(1.2); }

        /* 월간 뷰 */
        .monthly-header { display: grid; grid-template-columns: repeat(7, 1fr); background: #f7f7f5; border-bottom: 1px solid #e9e9e7; }
        .monthly-header > div { text-align: center; padding: 12px 0; font-size: 14px; font-weight: 500; }
        .monthly-body { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(120px, auto); }
        .month-day-cell { border-right: 1px solid #e9e9e7; border-bottom: 1px solid #e9e9e7; padding: 4px; min-height: 100px; }
        .month-date { font-size: 13px; color: #777; margin-bottom: 4px; }
        .month-event { font-size: 11px; padding: 2px 4px; margin-bottom: 2px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 4px; }

        /* 사이드바 & 모달 */
        .auto-schedule-panel {
            width: 280px; background: #f7f7f5; border-radius: 12px; border: 1px solid #e9e9e7;
            padding: 24px 24px 120px 24px; position: sticky; top: 105px; flex-shrink: 0;
        }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(2px);
        }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 24px; border-radius: 12px; width: 320px; display: flex; flex-direction: column; gap: 16px; }
        .time-input-group { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .time-input-group input { width: 60px; padding: 8px; border: 1px solid #e9e9e7; border-radius: 6px; text-align: center; }

        /* 플로팅 버튼 (FAB) */
        .edit-fab, .lock-fab {
            position: fixed; right: 30px; width: 65px; height: 65px; border-radius: 50%;
            border: none; box-shadow: 0 6px 16px rgba(0,0,0,0.2); z-index: 9000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; font-size: 11px; font-weight: 700; transition: all 0.3s;
        }
        .edit-fab { bottom: 30px; background: #007bff; color: white; }
        .edit-fab.active { background: #ff4d4d; }
        .lock-fab { bottom: 110px; background: #f0f0f0; color: #333; border: 2px solid #ccc; }
        .lock-fab.active { background: #333; color: white; border-color: #000; }

        /* 주말 색상 */
        .day-header.sunday { color: #ff4d4f; }
        .day-header.saturday { color: #1890ff; }

        /* 반응형 모바일 */
        @media (max-width: 768px) {
            header { padding: 15px; flex-direction: column; gap: 10px; position: static; }
            .header-right { width: 100%; justify-content: center; flex-wrap: wrap; gap: 10px; }
            .header-legend { width: 100%; justify-content: center; font-size: 14px !important; }
            .theme-selector { border-right: none; padding-right: 0; margin-right: 0; }
            .theme-selector span { display: none; }
            .theme-btn { width: 18px; height: 18px; }
            .app-container { flex-direction: column; padding: 10px 10px 120px 10px; height: calc(100vh - 140px); overflow-y: auto; }
            .weekly-header, .weekly-body { grid-template-columns: 40px repeat(7, 85px) !important; }
            .edit-fab, .lock-fab { right: 20px; width: 70px; height: 70px; }
            .edit-fab { bottom: 20px; }
            .lock-fab { bottom: 100px; }
            body.edit-mode-locked { overflow: hidden; position: fixed; width: 100%; }
        }
    </style>
</head>
<body class="">

    <header>
        <div class="header-title">
            <div class="cute-block" id="cuteBlock"></div>
            <h1>TimeBlocks</h1>
        </div>
        <div class="nav-controls">
            <button id="prevBtn">&lt;</button>
            <h2 id="currentDateDisplay">2026년 4월</h2>
            <button id="nextBtn">&gt;</button>
        </div>
        <div class="header-right">
            <div class="header-legend">
                <div style="display: flex; align-items: center; gap: 4px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    스케줄 고정(🔄)
                </div>
                <div style="display: flex; align-items: center; gap: 4px;">

                <button class="theme-btn" title="보라" data-theme="purple" style="background: #DAD9FF"></button>
                <button class="theme-btn" title="초록" data-theme="green" style="background: #CEFBC9"></button>

    <div class="app-container">
        <main>
            <div id="weeklyView" class="weekly-view">
                <div class="weekly-header" id="weeklyHeader"></div>
                <div class="weekly-body" id="weeklyBody">
                    <div class="time-col" id="time-col">
                        <script>
                            for(let i = 9; i <= 24; i++) {
                                document.write(`<div class="time-slot"><span>${i}</span></div>`);
                            }
                        </script>
                    </div>
                </div>
            </div>
            <div id="monthlyView" class="monthly-view">
                <div class="monthly-header">
                    <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
                </div>
                <div class="monthly-body" id="monthlyBody"></div>
            </div>
        </main>
        
        <aside class="auto-schedule-panel">
            <h3 style="display: flex; align-items: center; gap: 8px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #007bff;"><path d="M12 2a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2 2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"></path><path d="M12 20a2 2 0 0 1 2-2v-2a2 2 0 0 1-2-2 2 2 0 0 1-2 2v2a2 2 0 0 1 2 2z"></path><path d="M20 12a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2 2 2 0 0 1 2-2h2a2 2 0 0 1 2 2z"></path><path d="M4 12a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2 2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"></path><rect x="9" y="9" width="6" height="6" rx="1"></rect></svg>
                AI 스케줄러
            </h3>
            <div style="margin-top:15px;">
                <label style="display:block; font-size:12px; color:#777; margin-bottom:5px;">날짜 선택</label>
                <input type="date" id="autoDate" style="width:100%; padding:10px; border:1px solid #e9e9e7; border-radius:6px;">
            </div>
            <div style="margin-top:15px;">
                <label style="display:block; font-size:12px; color:#777; margin-bottom:5px;">할 일 목록 (줄바꿈 구분)</label>
                <textarea id="autoTasks" rows="5" placeholder="공부하기&#10;운동하기" style="width:100%; padding:10px; border:1px solid #e9e9e7; border-radius:6px; resize:none;"></textarea>
                <p style="font-size: 11px; color: #777; margin-top: 6px;">AI가 식사 시간과 휴식을 포함해 스케줄을 짜드려요!</p>
            </div>
            <div style="margin-top:15px; display:flex; flex-direction:column; gap:8px;">
                <button id="autoGenerateBtn" style="padding:12px; background:#333; color:white; border:none; border-radius:6px; font-weight:700; cursor:pointer;">추천 받기</button>
                <button id="autoRegenerateBtn" style="padding:12px; background:#eee; color:#333; border:none; border-radius:6px; font-weight:700; cursor:pointer; display:none;">다시 추천</button>
            </div>
        </aside>
    </div>

    <!-- 플로팅 버튼 -->
    <button id="lockToggleBtn" class="lock-fab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px; height:24px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        <span>고정</span>
    </button>
    <button id="editToggleBtn" class="edit-fab">
        <svg id="editIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        <svg id="doneIcon" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span id="editLabel">편집</span>
    </button>

    <!-- 모달 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-title" style="font-weight:700; font-size:18px;">일정 수정</div>
            <div class="time-input-group">
                <label>시작:</label>
                <input type="number" id="startH" min="9" max="23">시
                <input type="number" id="startM" min="0" max="59">분
            </div>
            <div class="time-input-group">
                <label>종료:</label>
                <input type="number" id="endH" min="9" max="24">시
                <input type="number" id="endM" min="0" max="59">분
            </div>
            <input type="text" id="editTitle" placeholder="일정 제목" style="padding:10px; border:1px solid #e9e9e7; border-radius:6px;">
            <div class="color-picker-wrap" style="display:flex; align-items:center; gap:10px;">
                <label style="font-size:14px;">색상:</label>
                <input type="color" id="editColor" style="width:40px; height:40px; border:none; background:none; cursor:pointer;">
            </div>
            <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:10px;">
                <button id="deleteBtn" style="padding:10px 15px; background:#ffebee; color:#c62828; border:none; border-radius:6px; font-weight:600; cursor:pointer;">삭제</button>
                <button id="cancelBtn" style="padding:10px 15px; background:#eee; border:none; border-radius:6px; font-weight:600; cursor:pointer;">취소</button>
                <button id="saveBtn" style="padding:10px 15px; background:#333; color:white; border:none; border-radius:6px; font-weight:600; cursor:pointer;">저장</button>
            </div>
        </div>
    </div>

    <script>
        /** 데이터 관리 **/
        let currentDate = new Date();
        let currentView = 'weekly';
        let events = JSON.parse(localStorage.getItem('timeblocks_events')) || [];
        function saveEvents() { localStorage.setItem('timeblocks_events', JSON.stringify(events)); }

        /** 모드 관리 **/
        let isEditMode = false;
        let isLockMode = false;
        const editBtn = document.getElementById('editToggleBtn');
        const lockBtn = document.getElementById('lockToggleBtn');

        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.body.classList.toggle('edit-mode-locked', isEditMode);
            if (isEditMode) {
                editBtn.classList.add('active');
                document.getElementById('editIcon').style.display = 'none';
                document.getElementById('doneIcon').style.display = 'block';
                document.getElementById('editLabel').textContent = '완료';
                if (isLockMode) toggleLockMode();
            } else {
                editBtn.classList.remove('active');
                document.getElementById('editIcon').style.display = 'block';
                document.getElementById('doneIcon').style.display = 'none';
                document.getElementById('editLabel').textContent = '편집';
            }
            render();
        }
        function toggleLockMode() {
            isLockMode = !isLockMode;
            lockBtn.classList.toggle('active', isLockMode);
            if (isLockMode && isEditMode) toggleEditMode();
            render();
        }
        editBtn.addEventListener('click', toggleEditMode);
        lockBtn.addEventListener('click', toggleLockMode);

        /** 테마 및 색상 **/
                const palettes = {
            pink:    ['#FFD9EC', '#FFADBC', '#FF8E9E', '#FFB7C5', '#FF6B81', '#FFC1CC'],
            blue:    ['#B2EBF4', '#81D4FA', '#4FC3F7', '#29B6F6', '#80DEEA', '#B3E5FC'],
            purple:  ['#DAD9FF', '#B39DDB', '#9575CD', '#CE93D8', '#B388FF', '#D1C4E9'],
            green:   ['#CEFBC9', '#A5D6A7', '#81C784', '#66BB6A', '#C8E6C9', '#B9F6CA'],
            rainbow: ['#FFD9EC', '#B2EBF4', '#DAD9FF', '#CEFBC9', '#FFF9C4', '#FFCCBC', '#D1C4E9']
        };
        let currentTheme = localStorage.getItem('timeblocks_theme') || 'pink';
        function getHashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            return Math.abs(hash);
        }

        function getThemeColorForTitle(title) {
            if (!title) title = '새 일정';
            const colors = palettes[currentTheme] || palettes['pink'];
            // 제목의 해시값을 사용하여 색상 배열에서 인덱스 결정 (일관성 유지)
            const index = getHashCode(title) % colors.length;
            return colors[index];
        }
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentTheme = e.target.dataset.theme;
                localStorage.setItem('timeblocks_theme', currentTheme);
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === currentTheme));
                events.forEach(ev => ev.color = getThemeColorForTitle(ev.title));
                saveEvents(); render();
            });
        });

        /** 유틸리티 **/
        function formatDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function getStartOfWeek(date) { const d = new Date(date); d.setDate(d.getDate() - d.getDay()); return d; }
        function getEventsForDate(dateStr) {
            const targetDate = new Date(dateStr);
            return events.filter(ev => {
                if (!ev.isRoutine && ev.date === dateStr) return true;
                if (ev.isRoutine) {
                    const evDate = new Date(ev.date);
                    return targetDate >= evDate && targetDate.getDay() === evDate.getDay();
                }
                return false;
            });
        }
        function isEventCompleted(ev, dateStr) { return ev.completedDates.includes(ev.isRoutine ? dateStr : ev.date); }
        function rgbToHex(rgb) {
            const res = rgb.match(/\\d+/g);
            return res ? "#" + res.slice(0,3).map(x => parseInt(x).toString(16).padStart(2,'0')).join('') : "#ffffff";
        }

        /** 일정 생성 및 드래그 **/
        let isCreating = false, dragStartY = 0, tempEventDiv = null, activeDayCol = null, isDraggingBlock = false;
        function handleMouseDown(e) {
            if (!isEditMode || e.target.closest('.event-block')) return;
            isCreating = true; activeDayCol = e.currentTarget;
            const rect = activeDayCol.getBoundingClientRect();
            dragStartY = e.clientY - rect.top;
            tempEventDiv = document.createElement('div');
            tempEventDiv.className = 'event-block temp-event';
            tempEventDiv.style.backgroundColor = getThemeColorForTitle('새 일정');
            tempEventDiv.style.top = `${dragStartY}px`;
            tempEventDiv.style.height = `50px`;
            tempEventDiv.innerHTML = '<span class="event-title">새 일정</span>';
            activeDayCol.appendChild(tempEventDiv);
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
        }
        function handleMouseMove(e) {
            if (!isCreating) return;
            const rect = activeDayCol.getBoundingClientRect();
            let h = (e.clientY - rect.top) - dragStartY;
            tempEventDiv.style.height = `${Math.max(16.7, Math.min(h, 750 - dragStartY))}px`;
        }
        function handleMouseUp(e) {
            if (!isCreating) return;
            isCreating = false;
            document.removeEventListener('mousemove', handleMouseMove);
            document.removeEventListener('mouseup', handleMouseUp);
            const dateStr = activeDayCol.dataset.date;
            let h = parseFloat(tempEventDiv.style.height);
            if (h < 16.7) h = 16.7;
            const startT = 9 + (dragStartY / 50), endT = startT + (h / 50);
            const newEv = { id: Date.now().toString(), title: '새 일정', date: dateStr, startTime: startT, endTime: endT, color: tempEventDiv.style.backgroundColor, isRoutine: false, completedDates: [], isAuto: false };
            events.push(newEv); saveEvents(); tempEventDiv.remove(); render(); openEditModal(newEv.id);
        }

        /** AI 스케줄러 **/
        function handleAutoSchedule() {
            const dateStr = document.getElementById('autoDate').value;
            if (!dateStr) return alert('날짜를 선택하세요.');
            const tasks = document.getElementById('autoTasks').value.split('\n').map(t=>t.trim()).filter(t=>t);
            events = events.filter(ev => !(ev.date === dateStr && ev.isAuto));
            let scheduled = [];
            
            const currentEvs = getEventsForDate(dateStr);
            const meals = [{t:'🍴 점심', s:12, e:13}, {t:'🍴 저녁', s:18, e:19}];
            
            function available(s, e) {
                if (s < 9 || e > 24) return false;
                return ![...currentEvs, ...scheduled].some(ev => {
                    const overlap = s < ev.endTime && e > ev.startTime;
                    return overlap;
                });
            }

            let nextTime = 9;
            tasks.forEach(t => {
                let dur = t.length < 5 ? 1 : 1.5;
                let placed = false;
                
                while (nextTime + dur <= 24) {
                    // 식사 시간 체크 및 자동 삽입
                    const meal = meals.find(m => !scheduled.some(s => s.title === m.t) && nextTime >= m.s);
                    if (meal) {
                        if (available(meal.s, meal.e)) {
                            scheduled.push({id:'ai_'+Math.random(), title:meal.t, date:dateStr, startTime:meal.s, endTime:meal.e, color:'#FFF9C4', isRoutine:false, completedDates:[], isAuto:true});
                            nextTime = meal.e;
                        }
                    }

                    if (available(nextTime, nextTime + dur)) {
                        scheduled.push({id:'ai_'+Math.random(), title:t, date:dateStr, startTime:nextTime, endTime:nextTime+dur, color:getThemeColorForTitle(t), isRoutine:false, completedDates:[], isAuto:true});
                        nextTime += dur;
                        placed = true;
                        
                        // 휴식 시간 (20분) 추가
                        if (available(nextTime, nextTime + 0.33)) {
                            scheduled.push({id:'ai_br_'+Math.random(), title:'☕ 휴식', date:dateStr, startTime:nextTime, endTime:nextTime+0.33, color:'#F5F5F5', isRoutine:false, completedDates:[], isAuto:true});
                            nextTime += 0.33;
                        }
                        break;
                    }
                    nextTime += 0.25; // 15분 단위로 이동하며 빈 공간 탐색
                }
            });

            // 남은 식사 시간 강제 삽입 시도
            meals.forEach(m => {
                if (!scheduled.some(s => s.title === m.t)) {
                    let s = m.s;
                    while (s + 1 <= 24) {
                        if (available(s, s + 1)) {
                            scheduled.push({id:'ai_'+Math.random(), title:m.t, date:dateStr, startTime:s, endTime:s+1, color:'#FFF9C4', isRoutine:false, completedDates:[], isAuto:true});
                            break;
                        }
                        s += 0.5;
                    }
                }
            });

            events.push(...scheduled);
            saveEvents();
            currentDate = new Date(dateStr);
            render();
            document.getElementById('autoRegenerateBtn').style.display = 'block';
        }
        document.getElementById('autoGenerateBtn').addEventListener('click', handleAutoSchedule);

        /** 렌더링 **/
        function renderWeeklyView() {
            const start = getStartOfWeek(currentDate);
            const days = ['일','월','화','수','목','금','토'];
            let headerHTML = '<div></div>';
            for(let i=0; i<7; i++) {
                const d = new Date(start); d.setDate(start.getDate()+i);
                headerHTML += `<div class="day-header ${i===0?'sunday':i===6?'saturday':''}">${days[i]}<br>${d.getMonth()+1}/${d.getDate()}</div>`;
            }
            document.getElementById('weeklyHeader').innerHTML = headerHTML;
            document.querySelectorAll('.day-col').forEach(c => c.remove());
            for(let i=0; i<7; i++) {
                const d = new Date(start); d.setDate(start.getDate()+i);
                const ds = formatDate(d);
                const col = document.createElement('div');
                col.className = 'day-col' + (ds === formatDate(new Date()) ? ' today' : '');
                col.dataset.date = ds;
                col.addEventListener('mousedown', handleMouseDown);
                setupColDrop(col, ds);
                getEventsForDate(ds).forEach(ev => {
                    const block = document.createElement('div');
                    block.className = 'event-block' + (isEditMode?' edit-active':'') + (isLockMode?' lock-mode-active':'');
                    const comp = isEventCompleted(ev, ds);
                    if (comp) block.classList.add('completed');
                    if (ev.isRoutine) block.classList.add('locked');
                    block.style.backgroundColor = ev.color;
                    block.style.top = `${(ev.startTime-9)*50}px`;
                    block.style.height = `${(ev.endTime-ev.startTime)*50}px`;
                    block.innerHTML = `
                        <span class="event-title" style="${comp?'text-decoration:line-through':''}">${ev.title}</span>
                        <button class="lock-btn ${ev.isRoutine?'active':''}" onclick="toggleRoutine('${ev.id}',event)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></button>
                        <button class="check-btn ${comp?'active':''}" onclick="toggleComplete('${ev.id}','${ds}',event)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
                    `;
                    setupBlockDrag(block, ev); setupBlockResize(block, ev);
                    col.appendChild(block);
                });
                document.getElementById('weeklyBody').appendChild(col);
            }
        }
        function renderMonthlyView() {
            const body = document.getElementById('monthlyBody'); body.innerHTML = '';
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            const first = new Date(y, m, 1), last = new Date(y, m+1, 0);
            for(let i=0; i<first.getDay(); i++) body.appendChild(document.createElement('div')).className='month-day-cell';
            for(let d=1; d<=last.getDate(); d++) {
                const ds = formatDate(new Date(y, m, d));
                const cell = document.createElement('div'); cell.className = 'month-day-cell';
                cell.innerHTML = `<div class="month-date">${d}</div>`;
                getEventsForDate(ds).forEach(ev => {
                    const div = document.createElement('div'); div.className = 'month-event';
                    div.style.background = ev.color; div.innerHTML = `<span>${ev.title}</span>`;
                    div.onclick = () => { if(isEditMode) openEditModal(ev.id); };
                    cell.appendChild(div);
                });
                body.appendChild(cell);
            }
        }

        /** 모달 및 기타 **/
        let editingEventId = null;
        function openEditModal(id) {
            const ev = events.find(e => e.id === id); if(!ev) return;
            editingEventId = id;
            document.getElementById('editTitle').value = ev.title;
            document.getElementById('editColor').value = ev.color;
            document.getElementById('startH').value = Math.floor(ev.startTime);
            document.getElementById('startM').value = Math.round((ev.startTime % 1)*60);
            document.getElementById('endH').value = Math.floor(ev.endTime);
            document.getElementById('endM').value = Math.round((ev.endTime % 1)*60);
            document.getElementById('editModal').classList.add('active');
        }
        document.getElementById('saveBtn').onclick = () => {
            const ev = events.find(e => e.id === editingEventId);
            if(ev) {
                ev.title = document.getElementById('editTitle').value || '새 일정';
                ev.color = document.getElementById('editColor').value;
                ev.startTime = parseInt(document.getElementById('startH').value) + (parseInt(document.getElementById('startM').value)/60);
                ev.endTime = parseInt(document.getElementById('endH').value) + (parseInt(document.getElementById('endM').value)/60);
            }
            saveEvents(); document.getElementById('editModal').classList.remove('active'); render();
        };
        document.getElementById('deleteBtn').onclick = () => { events = events.filter(e=>e.id!==editingEventId); saveEvents(); document.getElementById('editModal').classList.remove('active'); render(); };
        document.getElementById('cancelBtn').onclick = () => document.getElementById('editModal').classList.remove('active');
        
        function setupBlockDrag(b, ev) {
            b.draggable = isEditMode;
            b.ondragstart = (e) => { isDraggingBlock = true; e.dataTransfer.setData('text', ev.id); e.dataTransfer.setData('offset', e.clientY - b.getBoundingClientRect().top); };
            b.ondragend = () => isDraggingBlock = false;
            b.onclick = (e) => { if(isEditMode && !isDraggingBlock) openEditModal(ev.id); };
        }
        function setupBlockResize(b, ev) {
            const h = document.createElement('div'); h.className = 'resize-handle'; b.appendChild(h);
            h.onmousedown = (e) => {
                if(!isEditMode) return; e.stopPropagation();
                const startY = e.clientY, startH = b.offsetHeight;
                const onMove = (me) => { b.style.height = `${Math.max(16.7, startH + (me.clientY - startY))}px`; };
                const onUp = () => {
                    ev.endTime = ev.startTime + (b.offsetHeight/50);
                    saveEvents(); render(); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
            };
        }
        function setupColDrop(c, ds) {
            c.ondragover = (e) => { e.preventDefault(); c.classList.add('drag-over'); };
            c.ondragleave = () => c.classList.remove('drag-over');
            c.ondrop = (e) => {
                e.preventDefault(); c.classList.remove('drag-over');
                const id = e.dataTransfer.getData('text'), offset = parseFloat(e.dataTransfer.getData('offset'));
                const ev = events.find(item => item.id === id); if(!ev) return;
                const newS = 9 + ((e.clientY - c.getBoundingClientRect().top - offset)/50);
                const dur = ev.endTime - ev.startTime;
                ev.date = ds; ev.startTime = newS; ev.endTime = newS + dur;
                saveEvents(); render();
            };
        }
        function toggleComplete(id, ds, e) { e.stopPropagation(); const ev = events.find(e=>e.id===id); if(!ev) return; const k = ev.isRoutine?ds:ev.date; const i = ev.completedDates.indexOf(k); if(i>-1) ev.completedDates.splice(i,1); else ev.completedDates.push(k); saveEvents(); render(); }
        function toggleRoutine(id, e) { if(!isLockMode) return; e.stopPropagation(); const ev = events.find(e=>e.id===id); if(!ev) return; ev.isRoutine = !ev.isRoutine; saveEvents(); render(); }

        function render() {
            const d = document.getElementById('currentDateDisplay');
            d.textContent = `${currentDate.getFullYear()}년 ${currentDate.getMonth()+1}월`;
            if (currentView === 'weekly') { document.getElementById('weeklyView').style.display='block'; document.getElementById('monthlyView').style.display='none'; renderWeeklyView(); }
            else { document.getElementById('weeklyView').style.display='none'; document.getElementById('monthlyView').style.display='grid'; renderMonthlyView(); }
        }
        document.getElementById('prevBtn').onclick = () => { currentDate.setDate(currentDate.getDate()-(currentView==='weekly'?7:30)); render(); };
        document.getElementById('nextBtn').onclick = () => { currentDate.setDate(currentDate.getDate()+(currentView==='weekly'?7:30)); render(); };
        document.getElementById('viewSelect').onchange = (e) => { currentView = e.target.value; render(); };
        render();
    </script>
</body>
