<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeBlocks</title>
    <style>
        /* 기본 스타일 리셋 및 Notion 스타일 적용 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: #37352f;
            background-color: #ffffff;
            line-height: 1.5;
        }

        /* 헤더 영역 (네비게이션 및 뷰 전환) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #e9e9e7;
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title h1 {
            font-size: 22px;
            font-weight: 700;
            color: #37352f;
            letter-spacing: -0.5px;
        }

        .cute-block {
            width: 18px;
            height: 18px;
            background: #ffb3ba;
            border-radius: 4px;
            box-shadow: 2px 2px 0px #ffdfba, 4px 4px 0px #ffffba;
            transform: rotate(-10deg);
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-controls button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            padding: 4px 12px;
            border-radius: 6px;
            color: #37352f;
            transition: background 0.2s;
        }

        .nav-controls button:hover {
            background: #f0f0f0;
        }

        .nav-controls h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            min-width: 140px;
            text-align: center;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .view-controls select {
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #e9e9e7;
            background: #f7f7f5;
            cursor: pointer;
            outline: none;
            font-weight: 500;
        }

        /* ----- 메인 레이아웃 ----- */
        .app-container {
            display: flex;
            padding: 20px 40px;
            gap: 24px;
            align-items: flex-start;
        }

        main {
            flex: 1;
            min-width: 0;
        }

        /* ----- 자동 채우기 사이드바 ----- */
        .auto-schedule-panel {
            width: 280px;
            background: #f7f7f5;
            border-radius: 12px;
            border: 1px solid #e9e9e7;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 105px; /* 헤더 높이 + 여백 */
            flex-shrink: 0;
        }

        .auto-schedule-panel h3 {
            font-size: 16px;
            font-weight: 600;
            color: #37352f;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .auto-schedule-panel label {
            display: block;
            font-size: 13px;
            color: #777;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .auto-schedule-panel input[type="date"],
        .auto-schedule-panel textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e9e9e7;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            background: #ffffff;
        }

        .auto-schedule-panel textarea {
            resize: vertical;
        }

        .auto-schedule-panel input[type="date"]:focus,
        .auto-schedule-panel textarea:focus {
            border-color: #007bff;
        }

        .auto-buttons {
            display: flex;
            gap: 8px;
            flex-direction: column;
        }

        .auto-buttons button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .auto-buttons button:active {
            transform: scale(0.98);
        }

        #autoGenerateBtn { background: #333; color: white; }
        #autoGenerateBtn:hover { background: #000; }
        #autoRegenerateBtn { background: #e9e9e7; color: #333; display: none; }
        #autoRegenerateBtn:hover { background: #d0d0d0; }

        /* ----- 주간 뷰 (Weekly View) ----- */
        .weekly-view {
            display: flex;
            flex-direction: column;
            border: 1px solid #e9e9e7;
            border-radius: 8px;
            overflow: hidden;
        }

        .weekly-header {
            display: grid;
            grid-template-columns: 60px repeat(7, 1fr);
            border-bottom: 1px solid #e9e9e7;
            background: #f7f7f5;
        }

        .weekly-header > div {
            text-align: center;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 500;
        }

        .weekly-header .day-header {
            border-left: 1px solid #e9e9e7;
        }

        .weekly-body {
            display: grid;
            grid-template-columns: 60px repeat(7, 1fr);
            height: 900px; /* 15시간 * 60px (9:00 ~ 24:00) */
            position: relative;
        }

        .time-col {
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        .time-slot {
            height: 60px;
            text-align: right;
            padding-right: 8px;
            font-size: 12px;
            color: #999;
            border-bottom: 1px solid transparent;
            position: relative;
        }
        
        .time-slot span {
            position: absolute;
            top: -8px;
            right: 8px;
        }

        .day-col {
            border-left: 1px solid #e9e9e7;
            position: relative;
            background-size: 100% 60px;
            background-image: linear-gradient(to bottom, #f7f7f5 1px, transparent 1px);
            cursor: crosshair;
        }

        /* 일정 블록 (주간) */
        .event-block {
            position: absolute;
            left: 4px;
            right: 4px;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            transition: transform 0.2s ease, filter 0.2s ease, background-color 0.2s;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .event-block:hover {
            transform: scale(1.02);
            z-index: 10 !important;
        }

        /* 완료 상태 스타일 */
        .event-block.completed {
            filter: grayscale(0.8) brightness(0.9);
            color: #555;
        }

        .event-title {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            padding-right: 20px; /* 버튼과 겹치지 않게 */
        }

        /* 내부 버튼 스타일 */
        .event-block .lock-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            cursor: pointer;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.4;
            transition: opacity 0.2s, transform 0.2s;
            padding: 4px;
            color: inherit;
        }

        .event-block .lock-btn.active {
            opacity: 1;
        }

        .event-block .check-btn {
            position: absolute;
            bottom: 4px;
            left: 4px;
            cursor: pointer;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.4;
            transition: opacity 0.2s, transform 0.2s;
            padding: 4px;
            color: inherit;
        }

        .event-block .check-btn.active {
            opacity: 1;
        }

        .event-block button:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }

        .event-block .lock-btn.active:hover,
        .event-block .check-btn.active:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* 임시 생성 중인 블록 */
        .event-block.temp-event {
            opacity: 0.7;
            pointer-events: none;
            box-shadow: none;
        }

        /* ----- 월간 뷰 (Monthly View) ----- */
        .monthly-view {
            display: none; /* 기본은 숨김 */
            flex-direction: column;
            border: 1px solid #e9e9e7;
            border-radius: 8px;
            overflow: hidden;
        }

        .monthly-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: #f7f7f5;
            border-bottom: 1px solid #e9e9e7;
        }

        .monthly-header > div {
            text-align: center;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 500;
        }

        .monthly-body {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: minmax(120px, auto);
        }

        .month-day-cell {
            border-right: 1px solid #e9e9e7;
            border-bottom: 1px solid #e9e9e7;
            padding: 8px;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        .month-day-cell:nth-child(7n) {
            border-right: none;
        }

        .month-date {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #777;
        }

        /* 일정 텍스트 (월간) */
        .month-event {
            font-size: 12px;
            padding: 4px 6px;
            margin-bottom: 4px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .month-event:hover {
            filter: brightness(0.95);
        }

        .month-event.completed {
            filter: grayscale(0.8) brightness(0.9);
            text-decoration: line-through;
            color: #666;
        }

        .month-event::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--event-color);
            flex-shrink: 0;
        }

        /* ----- 모달 (일정 수정) ----- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none; /* 숨김 */
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .modal-content input[type="text"] {
            padding: 10px;
            border: 1px solid #e9e9e7;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }

        .modal-content input[type="text"]:focus {
            border-color: #007bff;
        }

        .color-picker-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .color-picker-wrap input[type="color"] {
            width: 40px;
            height: 40px;
            padding: 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 8px;
        }

        .modal-actions button {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        #saveBtn { background: #333; color: white; }
        #saveBtn:hover { background: #000; }
        #deleteBtn { background: #ffebee; color: #c62828; }
        #deleteBtn:hover { background: #ffcdd2; }
        #cancelBtn { background: #f0f0f0; color: #333; }
        #cancelBtn:hover { background: #e0e0e0; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <div class="cute-block"></div>
            <h1>TimeBlocks</h1>
        </div>
        <div class="nav-controls">
            <button id="prevBtn">&lt;</button>
            <h2 id="currentDateDisplay">2026년 4월</h2>
            <button id="nextBtn">&gt;</button>
        </div>
        <div class="header-right">
            <div class="view-controls">
                <select id="viewSelect">
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                </select>
            </div>
        </div>
    </header>

    <div class="app-container">
        <main>
            <!-- 주간 뷰 -->
            <div id="weeklyView" class="weekly-view">
                <div class="weekly-header" id="weeklyHeader">
                    <!-- JS로 렌더링 -->
                </div>
                <div class="weekly-body" id="weeklyBody">
                    <div class="time-col">
                        <!-- 9:00 ~ 24:00 (15시간) -->
                        <script>
                            for(let i = 9; i <= 24; i++) {
                                document.write(`<div class="time-slot"><span>${i}:00</span></div>`);
                            }
                        </script>
                    </div>
                    <!-- day-col 들은 JS로 렌더링 -->
                </div>
            </div>

            <!-- 월간 뷰 -->
            <div id="monthlyView" class="monthly-view">
                <div class="monthly-header">
                    <div>일</div><div>월</div><div>화</div><div>수</div>
                    <div>목</div><div>금</div><div>토</div>
                </div>
                <div class="monthly-body" id="monthlyBody">
                    <!-- JS로 렌더링 -->
                </div>
            </div>
        </main>
        
        <aside class="auto-schedule-panel">
            <h3>✨ 하루 일정 자동 채우기</h3>
            <div>
                <label for="autoDate">날짜 선택</label>
                <input type="date" id="autoDate">
            </div>
            <div>
                <label for="autoTasks">할 일 목록 (줄바꿈으로 구분)</label>
                <textarea id="autoTasks" rows="5" placeholder="밥먹기&#10;과제하기&#10;운동&#10;공부"></textarea>
            </div>
            <div class="auto-buttons">
                <button id="autoGenerateBtn">추천 받기</button>
                <button id="autoRegenerateBtn">다시 추천</button>
            </div>
        </aside>
    </div>

    <!-- 모달 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">일정 수정</div>
            <input type="text" id="editTitle" placeholder="일정 제목">
            <div class="color-picker-wrap">
                <label for="editColor">배경 색상:</label>
                <input type="color" id="editColor">
            </div>
            <div class="modal-actions">
                <button id="deleteBtn">삭제</button>
                <button id="cancelBtn">취소</button>
                <button id="saveBtn">저장</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * ----------------------------------
         * 데이터 및 상태 관리 (LocalStorage 연동)
         * ----------------------------------
         */
        
        let currentDate = new Date(); // 기본값: 오늘 (예: 2026-04-06)
        let currentView = 'weekly'; // 'weekly' | 'monthly'

        // LocalStorage에서 데이터 불러오기 (없으면 빈 배열)
        let events = JSON.parse(localStorage.getItem('timeblocks_events')) || [];

        // 데이터 변경 시 LocalStorage에 저장하는 함수
        function saveEvents() {
            localStorage.setItem('timeblocks_events', JSON.stringify(events));
        }

        // 랜덤 파스텔 색상 생성 (HEX)
        function getRandomPastelColor() {
            const r = Math.floor(Math.random() * 50 + 200); // 200~250
            const g = Math.floor(Math.random() * 50 + 200);
            const b = Math.floor(Math.random() * 50 + 200);
            const toHex = c => c.toString(16).padStart(2, '0');
            return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        }

        function rgbToHex(rgbStr) {
            const rgb = rgbStr.match(/\d+/g);
            if (!rgb || rgb.length < 3) return '#ffb3ba';
            const toHex = c => Number(c).toString(16).padStart(2, '0');
            return `#${toHex(rgb[0])}${toHex(rgb[1])}${toHex(rgb[2])}`;
        }

        function formatDate(d) {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 주의 시작일(일요일)
        function getStartOfWeek(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day;
            return new Date(d.setDate(diff));
        }

        // 해당 날짜에 해당하는 이벤트 필터링
        function getEventsForDate(targetDateStr) {
            const targetDateObj = new Date(targetDateStr);
            const targetDayOfWeek = targetDateObj.getDay();

            return events.filter(ev => {
                if (!ev.isRoutine && ev.date === targetDateStr) return true;
                if (ev.isRoutine) {
                    const evDateObj = new Date(ev.date);
                    if (targetDateObj >= evDateObj && evDateObj.getDay() === targetDayOfWeek) {
                        return true;
                    }
                }
                return false;
            });
        }

        function isEventCompleted(ev, targetDateStr) {
            if (ev.isRoutine) return ev.completedDates.includes(targetDateStr);
            return ev.completedDates.includes(ev.date);
        }

        // 완료 토글 (체크)
        function toggleComplete(id, targetDateStr, e) {
            e.stopPropagation();
            const ev = events.find(e => e.id === id);
            if (!ev) return;
            const dateKey = ev.isRoutine ? targetDateStr : ev.date;
            const idx = ev.completedDates.indexOf(dateKey);
            if (idx > -1) ev.completedDates.splice(idx, 1);
            else ev.completedDates.push(dateKey);
            saveEvents(); // 데이터 저장
            render();
        }

        // 루틴 토글 (고정)
        function toggleRoutine(id, e) {
            e.stopPropagation();
            const ev = events.find(e => e.id === id);
            if (!ev) return;
            ev.isRoutine = !ev.isRoutine;
            saveEvents(); // 데이터 저장
            render();
        }

        /**
         * ----------------------------------
         * 주간 뷰 드래그 생성
         * ----------------------------------
         */
        
        let isDragging = false;
        let dragStartY = 0;
        let tempEventDiv = null;
        let activeDayCol = null;

        function handleMouseDown(e) {
            if (e.target.closest('.event-block') || e.target.tagName === 'BUTTON') return;
            isDragging = true;
            activeDayCol = e.currentTarget;
            const rect = activeDayCol.getBoundingClientRect();
            dragStartY = e.clientY - rect.top;

            tempEventDiv = document.createElement('div');
            tempEventDiv.className = 'event-block temp-event';
            tempEventDiv.style.backgroundColor = getRandomPastelColor();
            tempEventDiv.style.top = `${dragStartY}px`;
            tempEventDiv.style.height = `60px`; // 최소 1시간 높이
            tempEventDiv.innerHTML = `<span class="event-title">새 일정</span>`;
            
            activeDayCol.appendChild(tempEventDiv);
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
        }

        function handleMouseMove(e) {
            if (!isDragging || !tempEventDiv) return;
            const rect = activeDayCol.getBoundingClientRect();
            let currentY = e.clientY - rect.top;
            let height = currentY - dragStartY;
            if (height < 15) height = 15; // 최소 15분
            if (dragStartY + height > 900) height = 900 - dragStartY; // 최대 24:00 제한
            tempEventDiv.style.height = `${height}px`;
        }

        function handleMouseUp(e) {
            if (!isDragging) return;
            isDragging = false;
            document.removeEventListener('mousemove', handleMouseMove);
            document.removeEventListener('mouseup', handleMouseUp);

            const dateStr = activeDayCol.dataset.date;
            const height = parseFloat(tempEventDiv.style.height);
            const color = tempEventDiv.style.backgroundColor;

            // 시작시간 계산 (1시간=60px, 9:00 시작)
            const startTime = 9 + (dragStartY / 60);
            const endTime = startTime + (height / 60);

            const newEvent = {
                id: Date.now().toString(),
                title: '새 일정',
                date: dateStr,
                startTime: startTime,
                endTime: endTime,
                color: color.startsWith('rgb') ? rgbToHex(color) : color,
                isRoutine: false,
                completedDates: [],
                isAuto: false // 수동 생성
            };

            events.push(newEvent);
            saveEvents(); // 데이터 저장
            
            tempEventDiv.remove();
            tempEventDiv = null;
            activeDayCol = null;

            render();
            // 생성 직후 모달 열기
            openEditModal(newEvent.id);
        }

        /**
         * ----------------------------------
         * 하루 일정 자동 추천 로직
         * ----------------------------------
         */
        
        // 날짜 초기값 셋팅
        document.getElementById('autoDate').value = formatDate(new Date());

        function handleAutoSchedule(isRegenerate = false) {
            const dateStr = document.getElementById('autoDate').value;
            if (!dateStr) return alert('날짜를 선택해주세요.');
            
            const text = document.getElementById('autoTasks').value;
            const tasks = text.split('\n').map(t => t.trim()).filter(t => t);
            if (tasks.length === 0) return alert('할 일을 1개 이상 입력해주세요.');
            
            // 기존 자동 생성 일정 삭제
            events = events.filter(ev => !(ev.date === dateStr && ev.isAuto));

            const currentDayEvents = getEventsForDate(dateStr);
            
            let scheduledTasks = [];
            let failedTasks = [];

            function isSlotAvailable(start, end) {
                if (start < 9 || end > 23) return false;
                const allEvs = [...currentDayEvents, ...scheduledTasks];
                for (let ev of allEvs) {
                    if (start < ev.endTime && end > ev.startTime) return false;
                }
                return true;
            }

            function findSlot(duration, preferredStart = 9, preferredEnd = 23) {
                for (let time = preferredStart; time <= preferredEnd - duration; time += 0.5) {
                    if (isSlotAvailable(time, time + duration)) return time;
                }
                if (preferredStart !== 9 || preferredEnd !== 23) {
                     for (let time = 9; time <= 23 - duration; time += 0.5) {
                        if (isSlotAvailable(time, time + duration)) return time;
                    }
                }
                return null;
            }

            let parsedTasks = tasks.map(t => {
                let duration = 1;
                let pStart = 9, pEnd = 23;
                let priority = 3;
                
                if (t.includes('밥') || t.includes('식사') || t.includes('점심') || t.includes('저녁')) {
                    duration = 1;
                    priority = 1;
                } else if (t.includes('운동')) {
                    duration = 1.5;
                    priority = 2;
                    pStart = 18; pEnd = 22;
                } else if (t.includes('공부') || t.includes('과제')) {
                    duration = 2;
                }
                
                return { title: t, duration, pStart, pEnd, priority };
            });

            parsedTasks = parsedTasks.slice(0, 5);
            parsedTasks.sort((a, b) => a.priority - b.priority);

            parsedTasks.forEach(task => {
                let startTime = null;
                
                if (task.priority === 1) { 
                    startTime = findSlot(task.duration, 12, 14);
                    if (startTime === null) startTime = findSlot(task.duration, 18, 20);
                    if (startTime === null) startTime = findSlot(task.duration, 9, 23);
                } else {
                    startTime = findSlot(task.duration, task.pStart, task.pEnd);
                }

                if (startTime !== null) {
                    scheduledTasks.push({
                        id: 'auto_' + Date.now() + Math.random().toString(36).substr(2, 5),
                        title: task.title,
                        date: dateStr,
                        startTime: startTime,
                        endTime: startTime + task.duration,
                        color: getRandomPastelColor(),
                        isRoutine: false,
                        completedDates: [],
                        isAuto: true
                    });
                } else {
                    failedTasks.push(task.title);
                }
            });

            if (scheduledTasks.length > 0) {
                events.push(...scheduledTasks);
                saveEvents(); // 데이터 저장
                
                const selectedDateObj = new Date(dateStr);
                currentDate = selectedDateObj;
                currentView = 'weekly';
                document.getElementById('viewSelect').value = 'weekly';
                
                render();

                document.getElementById('autoRegenerateBtn').style.display = 'block';
                document.getElementById('autoGenerateBtn').textContent = '추가 추천 받기';
                
                if (failedTasks.length > 0) {
                    alert('빈 시간이 부족하여 다음 일정은 배치하지 못했습니다:\n' + failedTasks.join(', '));
                }
            } else {
                alert('배치할 수 있는 빈 시간이 없습니다.');
            }
        }

        document.getElementById('autoGenerateBtn').addEventListener('click', () => handleAutoSchedule(false));
        document.getElementById('autoRegenerateBtn').addEventListener('click', () => handleAutoSchedule(true));


        /**
         * ----------------------------------
         * 뷰 렌더링
         * ----------------------------------
         */

        function renderWeeklyView() {
            const startOfWeek = getStartOfWeek(currentDate);
            const headerContainer = document.getElementById('weeklyHeader');
            const bodyContainer = document.getElementById('weeklyBody');

            const days = ['일', '월', '화', '수', '목', '금', '토'];
            let headerHTML = `<div></div>`;
            for (let i = 0; i < 7; i++) {
                const currentDay = new Date(startOfWeek);
                currentDay.setDate(startOfWeek.getDate() + i);
                headerHTML += `<div class="day-header">${days[i]}<br>${currentDay.getMonth() + 1}/${currentDay.getDate()}</div>`;
            }
            headerContainer.innerHTML = headerHTML;

            bodyContainer.querySelectorAll('.day-col').forEach(col => col.remove());

            for (let i = 0; i < 7; i++) {
                const currentDay = new Date(startOfWeek);
                currentDay.setDate(startOfWeek.getDate() + i);
                const dateStr = formatDate(currentDay);

                const dayCol = document.createElement('div');
                dayCol.className = 'day-col';
                dayCol.dataset.date = dateStr;
                dayCol.addEventListener('mousedown', handleMouseDown);

                const dayEvents = getEventsForDate(dateStr);
                dayEvents.forEach(ev => {
                    const block = document.createElement('div');
                    block.className = 'event-block';
                    const completed = isEventCompleted(ev, dateStr);
                    if (completed) block.classList.add('completed');
                    
                    block.style.backgroundColor = ev.color;
                    const top = (ev.startTime - 9) * 60;
                    const height = (ev.endTime - ev.startTime) * 60;
                    block.style.top = `${top}px`;
                    block.style.height = `${height}px`;
                    block.style.zIndex = Math.floor(top);

                    block.innerHTML = `
                        <span class="event-title" style="${completed ? 'text-decoration: line-through;' : ''}">${ev.title}</span>
                        <button class="lock-btn ${ev.isRoutine ? 'active' : ''}" title="루틴 고정" onclick="toggleRoutine('${ev.id}', event)">🔒</button>
                        <button class="check-btn ${completed ? 'active' : ''}" title="완료" onclick="toggleComplete('${ev.id}', '${dateStr}', event)">✔</button>
                    `;
                    block.addEventListener('click', () => openEditModal(ev.id));
                    dayCol.appendChild(block);
                });
                bodyContainer.appendChild(dayCol);
            }
        }

        function renderMonthlyView() {
            const bodyContainer = document.getElementById('monthlyBody');
            bodyContainer.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const firstDayOfWeek = firstDay.getDay();

            for (let i = 0; i < firstDayOfWeek; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'month-day-cell';
                emptyCell.style.backgroundColor = '#fafafa';
                bodyContainer.appendChild(emptyCell);
            }

            for (let d = 1; d <= lastDay.getDate(); d++) {
                const cellDate = new Date(year, month, d);
                const dateStr = formatDate(cellDate);
                const cell = document.createElement('div');
                cell.className = 'month-day-cell';
                cell.innerHTML = `<div class="month-date">${d}</div>`;
                
                const dayEvents = getEventsForDate(dateStr);
                dayEvents.forEach(ev => {
                    const completed = isEventCompleted(ev, dateStr);
                    const eventDiv = document.createElement('div');
                    eventDiv.className = `month-event ${completed ? 'completed' : ''}`;
                    eventDiv.style.setProperty('--event-color', ev.color);
                    eventDiv.innerHTML = `<span>${ev.title}</span>`;
                    eventDiv.addEventListener('click', () => openEditModal(ev.id));
                    cell.appendChild(eventDiv);
                });
                bodyContainer.appendChild(cell);
            }
        }

        /**
         * ----------------------------------
         * 모달 이벤트 및 렌더링 초기화
         * ----------------------------------
         */

        let editingEventId = null;

        function openEditModal(id) {
            const ev = events.find(e => e.id === id);
            if (!ev) return;
            editingEventId = id;
            document.getElementById('editTitle').value = ev.title;
            document.getElementById('editColor').value = ev.color;
            document.getElementById('editModal').classList.add('active');
            document.getElementById('editTitle').focus();
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingEventId = null;
        }

        document.getElementById('saveBtn').addEventListener('click', () => {
            if (!editingEventId) return;
            const ev = events.find(e => e.id === editingEventId);
            if (ev) {
                const newTitle = document.getElementById('editTitle').value.trim();
                ev.title = newTitle || '새 일정';
                ev.color = document.getElementById('editColor').value;
            }
            saveEvents(); // 데이터 저장
            closeEditModal();
            render();
        });

        document.getElementById('deleteBtn').addEventListener('click', () => {
            if (!editingEventId) return;
            events = events.filter(e => e.id !== editingEventId);
            saveEvents(); // 데이터 저장
            closeEditModal();
            render();
        });

        document.getElementById('cancelBtn').addEventListener('click', closeEditModal);

        function updateHeaderDisplay() {
            const display = document.getElementById('currentDateDisplay');
            if (currentView === 'weekly') {
                const start = getStartOfWeek(currentDate);
                const end = new Date(start);
                end.setDate(start.getDate() + 6);
                if (start.getMonth() === end.getMonth()) {
                    display.textContent = `${start.getFullYear()}년 ${start.getMonth() + 1}월`;
                } else {
                    display.textContent = `${start.getMonth() + 1}월 - ${end.getMonth() + 1}월`;
                }
            } else {
                display.textContent = `${currentDate.getFullYear()}년 ${currentDate.getMonth() + 1}월`;
            }
        }

        function render() {
            updateHeaderDisplay();
            if (currentView === 'weekly') {
                document.getElementById('weeklyView').style.display = 'flex';
                document.getElementById('monthlyView').style.display = 'none';
                renderWeeklyView();
            } else {
                document.getElementById('weeklyView').style.display = 'none';
                document.getElementById('monthlyView').style.display = 'flex';
                renderMonthlyView();
            }
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentView === 'weekly') currentDate.setDate(currentDate.getDate() - 7);
            else currentDate.setMonth(currentDate.getMonth() - 1);
            render();
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentView === 'weekly') currentDate.setDate(currentDate.getDate() + 7);
            else currentDate.setMonth(currentDate.getMonth() + 1);
            render();
        });

        document.getElementById('viewSelect').addEventListener('change', (e) => {
            currentView = e.target.value;
            render();
        });

        render();
    </script>
</body>
</html>
